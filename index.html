<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store Inventory System</title>
</head>
<body>

  <h1>Store Inventory System</h1>

  <script>
    class ProductProperties {
      constructor(name, price, quantity) {
        this.name = name;
        this.price = price;
        this.quantity = quantity;
      }
      getTotalValue() {
        return this.price * this.quantity;
      }
      toString() {
        return `Product: ${this.name}, Price: $${this.price.toFixed(2)}, Quantity: ${this.quantity}`;
      }
    }

    class PerishableProductProperties extends ProductProperties {
      constructor(name, price, quantity, expirationDate) {
        super(name, price, quantity);
        this.expirationDate = expirationDate;
      }
      toString() {
        return `Product: ${this.name}, Price: $${this.price.toFixed(2)}, Quantity: ${this.quantity}, Expiration Date: ${this.expirationDate}`;
      }
    }

    // Create two perishable product instances as required by the assignment
    // Each has a name, price, quantity, and expiration date (YYYY-MM-DD format)
    const milk   = new PerishableProductProperties("Milk",   1.50, 30, "2025-06-15");
    const yogurt = new PerishableProductProperties("Yogurt", 2.20, 25, "2025-05-30");

    // Quick test: log toString() output to confirm they work
    console.log(milk.toString());
    console.log(yogurt.toString());
  </script>

</body>
</html>
