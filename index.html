<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store Inventory System</title>
</head>
<body>

  <h1>Store Inventory System</h1>

  <script>
    // Base class: holds shared data for every product
    class ProductProperties {

      // constructor sets name, price, and quantity when a product is created
      constructor(name, price, quantity) {
        this.name = name;
        this.price = price;
        this.quantity = quantity;
      }

      // getTotalValue() returns how much this product is worth in stock total
      // Formula: price multiplied by quantity
      getTotalValue() {
        return this.price * this.quantity;
      }

    }
  </script>

</body>
</html>
