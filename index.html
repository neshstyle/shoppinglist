<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store Inventory System</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f4f4f4; padding: 20px; color: #222; }
    h1 { text-align: center; margin-bottom: 20px; }
    .card { background: white; border: 1px solid #ccc; border-radius: 6px; padding: 16px; margin-bottom: 16px; }
    .card h2 { margin-top: 0; font-size: 1.1rem; border-bottom: 1px solid #eee; padding-bottom: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid #eee; }
    th { background: #e8e8e8; }
    .perishable { color: #c0392b; font-size: 0.75rem; font-weight: bold; }
    .value-box { display: flex; gap: 20px; flex-wrap: wrap; }
    .value-box div { background: #eef2ff; border: 1px solid #b0b8f0; border-radius: 6px; padding: 12px 20px; min-width: 180px; }
    .value-box div span { display: block; font-size: 0.8rem; color: #555; }
    .value-box div strong { font-size: 1.3rem; }
    .found-box { background: #e9f7ef; border: 1px solid #a9dfbf; border-radius: 6px; padding: 12px 16px; }
    .not-found { color: #c0392b; }
    pre { background: #1e1e1e; color: #d4d4d4; padding: 14px; border-radius: 6px; font-size: 0.82rem; overflow-x: auto; }
  </style>
</head>
<body>

  <h1>Store Inventory System</h1>

  <script>
    class ProductProperties {
      constructor(name, price, quantity) {
        this.name = name;
        this.price = price;
        this.quantity = quantity;
      }
      getTotalValue() {
        return this.price * this.quantity;
      }
      toString() {
        return `Product: ${this.name}, Price: $${this.price.toFixed(2)}, Quantity: ${this.quantity}`;
      }
    }

    // Static method: called on the class itself, not on individual product instances
    // Takes an array of products and a discount decimal (e.g. 0.15 = 15%)
    // Loops through every product and reduces its price by the discount amount
    ProductProperties.applyDiscount = function(products, discount) {
      products.forEach(product => {
        // Multiply price by (1 - discount) to get the reduced price
        // parseFloat + toFixed(2) ensures clean 2-decimal output
        product.price = parseFloat((product.price * (1 - discount)).toFixed(2));
      });
    };

    class PerishableProductProperties extends ProductProperties {
      constructor(name, price, quantity, expirationDate) {
        super(name, price, quantity);
        this.expirationDate = expirationDate;
      }
      toString() {
        return `Product: ${this.name}, Price: $${this.price.toFixed(2)}, Quantity: ${this.quantity}, Expiration Date: ${this.expirationDate}`;
      }
    }

    const milk   = new PerishableProductProperties("Milk",   1.50, 30, "2025-06-15");
    const yogurt = new PerishableProductProperties("Yogurt", 2.20, 25, "2025-05-30");
  </script>

    <script>
    class ProductProperties { /* ... same as before ... */ }
    ProductProperties.applyDiscount = function(products, discount) { /* ... */ };
    class PerishableProductProperties extends ProductProperties { /* ... same as before ... */ }

    // Store class manages a collection of products
      class Store {
      constructor() {
        this.inventory = [];
      }

      addProduct(product) {
        this.inventory.push(product);
      }

      getInventoryValue() {
        return this.inventory.reduce((total, product) => {
          return total + product.getTotalValue();
        }, 0);
      }

      // findProductByName() searches the inventory for a matching name
      // toLowerCase() on both sides makes the search case-insensitive
      // Returns the product object if found, or null if nothing matches
      findProductByName(name) {
        return this.inventory.find(
          product => product.name.toLowerCase() === name.toLowerCase()
        ) || null;
      }
           // --- Regular products (no expiration date) ---
    // Each takes: name (string), price (number), quantity (number)
    const apple = new ProductProperties("Apple", 2.50, 100);
    const bread = new ProductProperties("Bread", 3.99, 40);
    const pasta = new ProductProperties("Pasta", 1.75, 60);

    // --- Perishable products (have an expiration date) ---
    // Each takes: name, price, quantity, expirationDate (YYYY-MM-DD string)
    const milk   = new PerishableProductProperties("Milk",   1.50, 30, "2025-06-15");
    const yogurt = new PerishableProductProperties("Yogurt", 2.20, 25, "2025-05-30");
    }
    // --- Regular products (no expiration date) ---
    // Each takes: name (string), price (number), quantity (number)
    const apple = new ProductProperties("Apple", 2.50, 100);
    const bread = new ProductProperties("Bread", 3.99, 40);
    const pasta = new ProductProperties("Pasta", 1.75, 60);

    // --- Perishable products (have an expiration date) ---
    // Each takes: name, price, quantity, expirationDate (YYYY-MM-DD string)
    const milk   = new PerishableProductProperties("Milk",   1.50, 30, "2025-06-15");
    const yogurt = new PerishableProductProperties("Yogurt", 2.20, 25, "2025-05-30");
    }
       // Create a new Store instance — inventory starts as an empty array
    const myStore = new Store();

    // Add all five products to the store's inventory
    // addProduct() pushes each object into the inventory array
    myStore.addProduct(apple);
    myStore.addProduct(bread);
    myStore.addProduct(pasta);
    myStore.addProduct(milk);
    myStore.addProduct(yogurt);
      
 // Record total inventory value BEFORE applying any discount
    const valueBefore = myStore.getInventoryValue();
    console.log("Inventory value before discount: $" + valueBefore.toFixed(2));

    // Apply a 15% discount to every product in the inventory
    // 0.15 represents 15% — the static method reduces each product's price
    ProductProperties.applyDiscount(myStore.inventory, 0.15);

    // Record total inventory value AFTER the discount has been applied
    const valueAfter = myStore.getInventoryValue();
    console.log("Inventory value after discount: $" + valueAfter.toFixed(2));
    // Search for a product by name using the store's findProductByName() method
    // The search is case-insensitive so "milk" and "Milk" both work
    const searchTerm = "Milk";
    const foundProduct = myStore.findProductByName(searchTerm);

    // If a matching product is found, print its details using toString()
    // If not found, findProductByName returns null — log a fallback message
    if (foundProduct) {
      console.log("Found: " + foundProduct.toString());
    } else {
      console.log("Product not found: " + searchTerm);
    }
      
      
  </script>
