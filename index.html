<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store Inventory System</title>
</head>
<body>

  <h1>Store Inventory System</h1>

  <script>
    class ProductProperties {
      constructor(name, price, quantity) {
        this.name = name;
        this.price = price;
        this.quantity = quantity;
      }
      getTotalValue() {
        return this.price * this.quantity;
      }
      toString() {
        return `Product: ${this.name}, Price: $${this.price.toFixed(2)}, Quantity: ${this.quantity}`;
      }
    }

    // Subclass for perishable products — inherits from ProductProperties
    class PerishableProductProperties extends ProductProperties {

      // constructor calls super() to run the parent constructor first,
      // then adds the expirationDate property unique to perishable items
      constructor(name, price, quantity, expirationDate) {
        super(name, price, quantity); // pass shared properties up to the base class
        this.expirationDate = expirationDate; // new property only perishables have
      }

    }
  </script>

</body>
</html>
