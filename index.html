<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store Inventory System</title>
</head>
<body>

  <h1>Store Inventory System</h1>

  <script>
    // Base class: holds shared data for every product
    class ProductProperties {

      // constructor() runs automatically when a new product is created
      // It sets the three required properties for every product
      constructor(name, price, quantity) {
        this.name = name;         // product name (string)
        this.price = price;       // price per unit (number)
        this.quantity = quantity; // units available in stock (number)
      }

    }
  </script>

</body>
</html>
