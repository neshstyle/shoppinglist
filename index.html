<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store Inventory System</title>
</head>
<body>

  <h1>Store Inventory System</h1>

  <script>
    // Base class: holds shared data for every product
    class ProductProperties {

      // constructor sets name, price, and quantity when a product is created
      constructor(name, price, quantity) {
        this.name = name;
        this.price = price;
        this.quantity = quantity;
      }

      // getTotalValue() returns total stock value: price x quantity
      getTotalValue() {
        return this.price * this.quantity;
      }

      // toString() returns a human-readable description of the product
      // toFixed(2) ensures the price always shows two decimal places
      toString() {
        return `Product: ${this.name}, Price: $${this.price.toFixed(2)}, Quantity: ${this.quantity}`;
      }

    }
  </script>

</body>
</html>
